spring:
  application:
    name: task-manager
  data:
    mongodb:
      # No default: the application must fail to start rather than fall back to a
      # credential baked into the image.
      uri: ${MONGODB_URI}
      database: task-manager
      authentication-database: task-manager

jwt:
  # No default, deliberately. This key signs and validates every access token; a
  # committed fallback is a published master credential.
  secret: ${JWT_SECRET}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}

# OpenAPI docs are OFF by default. /v3/api-docs and /swagger-ui answered 200 to anonymous
# callers, publishing the full API shape of a service whose every other route is authenticated.
# Set SPRINGDOC_ENABLED=true for local development.
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}

# Brute-force guard on the two unauthenticated credential endpoints. The buckets live in
# memory, so the limit is per instance and resets on restart -- correct for this
# single-instance deployment, wrong for a horizontally scaled one.
app:
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:5}
    refill-period: ${RATE_LIMIT_REFILL_PERIOD:1m}
    # Only enable behind a proxy that overwrites X-Forwarded-For. Any client can send the
    # header, so trusting it elsewhere gives a caller a fresh bucket per request.
    trust-forwarded-for: ${RATE_LIMIT_TRUST_FORWARDED_FOR:false}
    max-buckets: ${RATE_LIMIT_MAX_BUCKETS:10000}

server:
  port: ${SERVER_PORT:80}

logging:
  level:
    # DEBUG on a security stack routinely writes tokens and credentials to the log.
    root: ${LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        # Only these three exist. `prometheus` needs micrometer-registry-prometheus (absent),
        # `httptrace` needs an HttpExchangeRepository bean, and `openapi`/`swagger-ui` are
        # springdoc paths, not actuator endpoints. Listing them was inert.
        include: health, info, metrics
  server:
    port: ${MANAGEMENT_PORT:9090}
