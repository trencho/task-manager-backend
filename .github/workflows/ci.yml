name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (JDK 25)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # Java 25 (current LTS). javac 23+ no longer runs annotation processors found only on the
      # classpath, so the pom declares Lombok and MapStruct explicitly via annotationProcessorPaths
      # (maven-compiler-plugin) — that, not a version pin, is what keeps the generated code building.
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        # ubuntu-latest runners ship a running Docker daemon, which the Testcontainers
        # -backed TaskControllerIntegrationTest needs. Testcontainers is pinned to
        # 1.21.4 in the pom; anything older speaks a Docker API the engine rejects.
        run: ./mvnw -B clean verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn
