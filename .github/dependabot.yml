version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR per week for the routine bumps, instead of five that each need a CI run.
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - /docker/java
      - /docker/mongo
    schedule:
      interval: weekly
