version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR per week for the routine bumps, instead of five that each need a CI run.
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # Spring Boot 4.x removes org.springframework.boot.test.mock.mockito.MockBean, which
      # AuthControllerIntegrationTest still imports. Dependabot opened this bump and CI
      # caught it. Migrate deliberately, not through an automated PR.
      - dependency-name: "org.springframework.boot:*"
        update-types: [version-update:semver-major]

      # springdoc 3.x is a breaking major aligned with Spring Boot 4.
      - dependency-name: "org.springdoc:*"
        update-types: [version-update:semver-major]

      # mapstruct's only newer release is 1.7.0.Beta2. A beta annotation processor has no
      # business in a build.
      - dependency-name: "org.mapstruct:*"

      # Testcontainers is pinned above the Spring Boot BOM on purpose: <= 1.21.3 speaks a
      # Docker API that Engine 29 rejects. Never let it drift downward.
      - dependency-name: "org.testcontainers:*"
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - /docker/java
      - /docker/mongo
    schedule:
      interval: weekly
    ignore:
      # Stay on the current Java LTS (25). The build is no longer JDK-version-locked — Lombok and
      # MapStruct are declared via annotationProcessorPaths, so javac 23+ runs them — so this pin is
      # purely an LTS-cadence choice: skip the 6-month non-LTS majors (26, 27, 28) and move
      # deliberately at the next LTS.
      - dependency-name: "eclipse-temurin"
        update-types: [version-update:semver-major]
      # Stay on MongoDB's 8.0 line; 8.1+ are rapid releases.
      - dependency-name: "mongo"
        update-types: [version-update:semver-major, version-update:semver-minor]
